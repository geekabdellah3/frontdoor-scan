    <!-- Intercept React Router so it renders the homepage regardless of local file:// path -->
    <script>
      // Override history so React Router thinks we're at "/"
      (function() {
        try {
          window.history.pushState({}, '', '/');
        } catch(e) {}
        // Patch fetch/XHR to allow cross-origin requests to frontdoorscan.com assets
        var _open = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
          if (url && url.startsWith('/') && !url.startsWith('//')) {
            url = 'https://frontdoorscan.com' + url;
          }
          return _open.apply(this, arguments);
        };
        var _fetch = window.fetch;
        window.fetch = function(input, init) {
          if (typeof input === 'string' && input.startsWith('/') && !input.startsWith('//')) {
            input = 'https://frontdoorscan.com' + input;
          }
          return _fetch.apply(this, arguments);
        };
      })();
    </script>
